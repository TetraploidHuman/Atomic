name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  LLVM_VERSION: "20"

jobs:
  # ── Tests (library crate only, no LLVM needed) ──
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Run library tests (no LLVM needed)
        run: cargo test --lib --no-default-features

      - name: Build LSP server
        run: cargo build -p atomic-lsp --release

      - name: Upload LSP (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: atomic-lsp-linux-x64
          path: target/release/atomic-lsp

  # ── Linux x86_64 compiler builds ──
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository -y "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-$LLVM_VERSION main"
          sudo apt-get update
          sudo apt-get install -y llvm-$LLVM_VERSION-dev libclang-$LLVM_VERSION-dev lld-$LLVM_VERSION libpolly-$LLVM_VERSION-dev
          # Make llvm-config available unversioned
          sudo ln -sf /usr/bin/llvm-config-$LLVM_VERSION /usr/local/bin/llvm-config
          echo "LLVM_SYS_201_PREFIX=/usr/lib/llvm-$LLVM_VERSION" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/lib/llvm-$LLVM_VERSION/lib" >> $GITHUB_ENV
          llvm-config --version

      - name: Build static (self-contained)
        env:
          LLVM_SYS_201_PREFIX: /usr/lib/llvm-20
        run: |
          cargo build --release --no-default-features --features codegen-static
          cp target/release/atomic atomic-linux-x64-static
          ls -lh atomic-linux-x64-static

      - name: Build dynamic (needs libLLVM.so)
        env:
          LLVM_SYS_201_PREFIX: /usr/lib/llvm-20
          LD_LIBRARY_PATH: /usr/lib/llvm-20/lib
        run: |
          cargo build --release --features codegen-dynamic
          cp target/release/atomic atomic-linux-x64-dynamic
          ls -lh atomic-linux-x64-dynamic

      - name: Smoke test
        run: |
          # Test static binary can compile a simple program
          echo 'fun main() { println("CI OK") }' > /tmp/test.at
          ./atomic-linux-x64-static build --target native /tmp/test.at --emit obj -o /tmp/test.o
          file /tmp/test.o && echo "Static binary OK"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atomic-linux-x64
          path: |
            atomic-linux-x64-static
            atomic-linux-x64-dynamic

  # ── Windows x86_64 compiler build ──
  build-windows:
    runs-on: windows-2025
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20
        run: |
          $ErrorActionPreference = "Stop"
          $llvmVersion = "20.1.0"

          # Try portable archive first (more reliable in CI than NSIS installer)
          $archiveUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/clang+llvm-$llvmVersion-x86_64-pc-windows-msvc.tar.xz"
          $archiveFile = "$env:TEMP\llvm.tar.xz"
          $llvmPath = $null

          try {
            Write-Host "Downloading LLVM portable archive..."
            Invoke-WebRequest -Uri $archiveUrl -OutFile $archiveFile -ErrorAction Stop
            Write-Host "Extracting with tar..."
            New-Item -Force -ItemType Directory -Path "C:\llvm-tmp"
            tar -xf $archiveFile -C "C:\llvm-tmp"
            # tar creates a top-level dir like clang+llvm-20.1.0-x86_64-pc-windows-msvc
            $extracted = Get-ChildItem "C:\llvm-tmp" -Directory | Select-Object -First 1
            if ($extracted) {
              Move-Item $extracted.FullName "C:\llvm"
            } else {
              Move-Item "C:\llvm-tmp" "C:\llvm"
            }
            Remove-Item "C:\llvm-tmp" -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item $archiveFile -Force
            if (Test-Path "C:\llvm\bin\llvm-config.exe") {
              $llvmPath = "C:\llvm"
            }
          } catch {
            Write-Host "Archive approach failed: $_"
          }

          # Fallback: NSIS installer
          if (-not $llvmPath) {
            Write-Host "Falling back to NSIS installer..."
            $llvmInstaller = "$env:TEMP\LLVM-installer.exe"
            Invoke-WebRequest -Uri "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/LLVM-$llvmVersion-win64.exe" -OutFile $llvmInstaller

            # Check if we got a real PE or an HTML error page
            $firstBytes = [System.IO.File]::ReadAllBytes($llvmInstaller)[0..1]
            if ($firstBytes[0] -ne 77 -or $firstBytes[1] -ne 90) {
              Write-Host "ERROR: downloaded file is not a PE executable (first bytes: $firstBytes)"
              Write-Host "Content preview:"
              Get-Content $llvmInstaller -TotalCount 5 -ErrorAction SilentlyContinue
              throw "Download did not yield a valid Windows executable"
            }

            $proc = Start-Process -PassThru -Wait -FilePath $llvmInstaller -ArgumentList "/S"
            Write-Host "Installer exit code: $($proc.ExitCode)"
            Remove-Item $llvmInstaller -Force

            $candidates = @(
              "C:\Program Files\LLVM",
              "C:\LLVM"
            )
            foreach ($p in $candidates) {
              if (Test-Path "$p\bin\llvm-config.exe") { $llvmPath = $p; break }
            }
            if (-not $llvmPath) {
              Write-Host "Searching for llvm-config.exe..."
              $found = Get-ChildItem "C:\Program Files" -Recurse -Filter "llvm-config.exe" -Depth 5 -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) {
                $llvmPath = Split-Path -Parent (Split-Path -Parent $found.FullName)
              } else {
                # Dump LLVM dir contents for debugging
                $llvmDir = "C:\Program Files\LLVM"
                if (Test-Path $llvmDir) {
                  Write-Host "Contents of $llvmDir:"
                  Get-ChildItem $llvmDir -Recurse -Depth 2 | ForEach-Object { Write-Host "  $_" }
                }
                throw "llvm-config.exe not found"
              }
            }
          }

          Write-Host "LLVM prefix: $llvmPath"
          & "$llvmPath\bin\llvm-config.exe" --version

          echo "LLVM_SYS_201_PREFIX=$llvmPath" >> $env:GITHUB_ENV
          echo "$llvmPath\bin" >> $env:GITHUB_PATH

      - name: Build Windows binary
        run: |
          cargo build --release --no-default-features --features codegen-windows
          ls -lh target/release/atomic.exe

      - name: Smoke test
        run: |
          # Test the binary can compile a simple program (LLVM bin is on GITHUB_PATH)
          echo 'fun main() { println("CI OK") }' > $env:TEMP\test.at
          .\target\release\atomic.exe build --target native $env:TEMP\test.at --emit obj -o $env:TEMP\test.o
          echo "Windows binary OK"

      - name: Bundle DLL dependencies
        run: |
          $llvmPath = $env:LLVM_SYS_201_PREFIX
          $distDir = "dist\atomic-windows-x64"
          New-Item -ItemType Directory -Force -Path "$distDir\bin"
          Copy-Item "target\release\atomic.exe" "$distDir\bin\atomic.exe"
          Copy-Item "$llvmPath\bin\LLVM-C.dll" "$distDir\bin\"
          # Copy examples & stdlib
          Copy-Item -Recurse "examples" "$distDir\examples"
          Copy-Item -Recurse "stdlib" "$distDir\stdlib"
          # Create zip
          Compress-Archive -Path "$distDir\*" -DestinationPath "atomic-windows-x64.zip"
          ls -lh atomic-windows-x64.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atomic-windows-x64
          path: |
            target/release/atomic.exe
            atomic-windows-x64.zip

  # ── GitHub Release (only on version tags) ──
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build-linux, build-windows]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release archive
        run: |
          mkdir -p release
          ls -R

          # Linux
          cp atomic-linux-x64/atomic-linux-x64-static release/
          cp atomic-linux-x64/atomic-linux-x64-dynamic release/
          tar czf release/atomic-linux-x64.tar.gz \
            -C atomic-linux-x64 atomic-linux-x64-static atomic-linux-x64-dynamic

          # Windows
          cp atomic-windows-x64/atomic-windows-x64.zip release/

          # LSP
          cp atomic-lsp-linux-x64/atomic-lsp release/atomic-lsp-linux-x64

          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
