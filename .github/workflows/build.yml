name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  LLVM_VERSION: "20"

jobs:
  # ── Tests (library crate only, no LLVM needed) ──
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Run library tests (no LLVM needed)
        run: cargo test --lib --no-default-features

      - name: Build LSP server
        run: cargo build -p atomic-lsp --release

      - name: Upload LSP (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: atomic-lsp-linux-x64
          path: target/release/atomic-lsp

  # ── Linux x86_64 compiler builds ──
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository -y "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-$LLVM_VERSION main"
          sudo apt-get update
          sudo apt-get install -y llvm-$LLVM_VERSION-dev libclang-$LLVM_VERSION-dev lld-$LLVM_VERSION libpolly-$LLVM_VERSION-dev
          # Make llvm-config available unversioned
          sudo ln -sf /usr/bin/llvm-config-$LLVM_VERSION /usr/local/bin/llvm-config
          echo "LLVM_SYS_201_PREFIX=/usr/lib/llvm-$LLVM_VERSION" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/lib/llvm-$LLVM_VERSION/lib" >> $GITHUB_ENV
          llvm-config --version

      - name: Build static (self-contained)
        env:
          LLVM_SYS_201_PREFIX: /usr/lib/llvm-20
        run: |
          cargo build --release --no-default-features --features codegen-static
          cp target/release/atomic atomic-linux-x64-static
          ls -lh atomic-linux-x64-static

      - name: Build dynamic (needs libLLVM.so)
        env:
          LLVM_SYS_201_PREFIX: /usr/lib/llvm-20
          LD_LIBRARY_PATH: /usr/lib/llvm-20/lib
        run: |
          cargo build --release --features codegen-dynamic
          cp target/release/atomic atomic-linux-x64-dynamic
          ls -lh atomic-linux-x64-dynamic

      - name: Smoke test
        run: |
          # Test static binary can compile a simple program
          echo 'fun main() { println("CI OK") }' > /tmp/test.at
          ./atomic-linux-x64-static build --target native /tmp/test.at --emit obj -o /tmp/test.o
          file /tmp/test.o && echo "Static binary OK"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atomic-linux-x64
          path: |
            atomic-linux-x64-static
            atomic-linux-x64-dynamic

  # ── Windows x86_64 compiler build ──
  build-windows:
    runs-on: windows-2025
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20
        run: |
          $ErrorActionPreference = "Stop"
          $llvmVersion = "20.1.0"
          $archiveName = "clang+llvm-$llvmVersion-x86_64-pc-windows-msvc"
          $archiveUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/$archiveName.tar.xz"

          Write-Host "Downloading $archiveName.tar.xz..."
          # curl.exe handles GitHub's redirect chain better than Invoke-WebRequest
          curl.exe -sSL -o C:\llvm.tar.xz $archiveUrl

          Write-Host "Extracting..."
          New-Item -Force -ItemType Directory -Path C:\llvm-extract | Out-Null
          tar -xf C:\llvm.tar.xz -C C:\llvm-extract
          Remove-Item C:\llvm.tar.xz -Force

          # tar extracts into a subdirectory, move contents to C:\llvm
          $innerDir = Get-ChildItem C:\llvm-extract -Directory | Select-Object -First 1
          if ($innerDir) {
            Move-Item $innerDir.FullName C:\llvm -Force
          } else {
            Rename-Item C:\llvm-extract C:\llvm -Force
          }
          Remove-Item C:\llvm-extract -Recurse -Force -ErrorAction SilentlyContinue

          if (-not (Test-Path "C:\llvm\bin\llvm-config.exe")) {
            Write-Host "Contents of C:\llvm:"
            Get-ChildItem C:\llvm -Depth 1 | ForEach-Object { Write-Host "  $_" }
            throw "llvm-config.exe not found in C:\llvm\bin"
          }

          $llvmPath = "C:\llvm"
          Write-Host "LLVM prefix: $llvmPath"
          & "$llvmPath\bin\llvm-config.exe" --version

          echo "LLVM_SYS_201_PREFIX=$llvmPath" >> $env:GITHUB_ENV
          echo "$llvmPath\bin" >> $env:GITHUB_PATH

      - name: Diagnose LLVM linking mode
        run: |
          Write-Host "=== LLVM linking mode ==="
          & "$env:LLVM_SYS_201_PREFIX\bin\llvm-config.exe" --link-shared
          Write-Host "=== Static libs ==="
          & "$env:LLVM_SYS_201_PREFIX\bin\llvm-config.exe" --link-static --libfiles 2>&1 | Select-Object -First 3
          Write-Host "=== System libs ==="
          & "$env:LLVM_SYS_201_PREFIX\bin\llvm-config.exe" --system-libs 2>&1

      - name: Create libxml2 stub (needed by LLVM static libs)
        run: |
          if (-not (Test-Path "C:\llvm\lib\libxml2s.lib")) {
            $libExe = Get-ChildItem "$env:ProgramFiles\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC" -Recurse -Filter "lib.exe" -Depth 6 -ErrorAction SilentlyContinue | Where-Object { $_.Directory.Name -eq "x64" -and $_.Directory.Parent.Name -eq "HostX64" } | Select-Object -First 1
            if (-not $libExe) { throw "Cannot find lib.exe" }
            "LIBRARY libxml2`nEXPORTS" | Out-File -Encoding ASCII C:\llvm\lib\libxml2s.def
            & $libExe.FullName /DEF:C:\llvm\lib\libxml2s.def /OUT:C:\llvm\lib\libxml2s.lib /MACHINE:X64
            Remove-Item C:\llvm\lib\libxml2s.def -Force
          }

      - name: Build static (self-contained, no DLL needed)
        env:
          LLVM_SYS_201_PREFIX: C:\llvm
        run: |
          cargo build --release --no-default-features --features codegen-static
          Move-Item target/release/atomic.exe atomic-windows-x64-static.exe
          Get-ChildItem atomic-windows-x64-static.exe

      - name: Build LSP server (no LLVM needed)
        run: |
          cargo build -p atomic-lsp --release
          Move-Item target/release/atomic-lsp.exe atomic-lsp-windows-x64.exe
          Get-ChildItem atomic-lsp-windows-x64.exe

      - name: Smoke test (check)
        run: |
          $testFile = "test.at"
          'fun main() { println("CI OK") }' | Set-Content -Path $testFile -Encoding ASCII
          $out = & .\atomic-windows-x64-static.exe check $testFile 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "check failed (exit $LASTEXITCODE): $out"
            exit 1
          }
          Write-Host "Check OK"

      - name: Smoke test (build, default .ll output)
        run: |
          $testFile = "test.at"
          $out = & .\atomic-windows-x64-static.exe build $testFile 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "build failed (exit $LASTEXITCODE): $out"
            exit 1
          }
          Write-Host "Build (default .ll) OK"

      - name: Smoke test (build --emit ir)
        run: |
          $testFile = "test.at"
          $out = & .\atomic-windows-x64-static.exe build --emit ir $testFile 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "build ir failed (exit $LASTEXITCODE): $out"
            exit 1
          }
          Write-Host "Build IR OK"

      - name: Smoke test (build --emit bc)
        run: |
          $testFile = "test.at"
          $out = & .\atomic-windows-x64-static.exe build --emit bc $testFile 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "build bc failed (exit $LASTEXITCODE): $out"
            exit 1
          }
          Write-Host "Build BC OK"

      - name: Smoke test (build --emit obj)
        run: |
          $testFile = "test.at"
          $out = & .\atomic-windows-x64-static.exe build --emit obj $testFile 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "build obj failed (exit $LASTEXITCODE): $out"
            exit 1
          }
          Write-Host "Build OBJ OK"

      - name: Smoke test (build --emit asm)
        run: |
          $testFile = "test.at"
          $out = & .\atomic-windows-x64-static.exe build --emit asm $testFile 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "build asm failed (exit $LASTEXITCODE): $out"
            exit 1
          }
          Write-Host "Build ASM OK"

      - name: Check DLL dependencies
        run: |
          $vsDir = "$env:ProgramFiles\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC"
          $dumpbin = Get-ChildItem $vsDir -Recurse -Filter "dumpbin.exe" -Depth 6 -ErrorAction SilentlyContinue | Where-Object { $_.Directory.Name -eq "x64" -and $_.Directory.Parent.Name -eq "HostX64" } | Select-Object -First 1
          if ($dumpbin) {
            Write-Host "Static binary dependencies:"
            & $dumpbin.FullName /dependents atomic-windows-x64-static.exe 2>&1 | Select-Object -First 20
          } else {
            Write-Host "dumpbin.exe not found, skipping dependency check"
          }

      - name: Bundle distribution
        run: |
          $distDir = "dist\atomic-windows-x64"
          New-Item -ItemType Directory -Force -Path "$distDir\bin"
          # Static binary (self-contained, no LLVM DLL needed)
          Copy-Item "atomic-windows-x64-static.exe" "$distDir\bin\atomic.exe"
          # Copy examples & stdlib
          Copy-Item -Recurse "examples" "$distDir\examples"
          Copy-Item -Recurse "stdlib" "$distDir\stdlib"
          # Create zip
          Compress-Archive -Path "$distDir\*" -DestinationPath "atomic-windows-x64.zip"
          Get-Item atomic-windows-x64.zip | Select-Object Name, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atomic-windows-x64
          path: |
            atomic-windows-x64-static.exe
            atomic-lsp-windows-x64.exe
            atomic-windows-x64.zip

  # ── GitHub Release (only on version tags) ──
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build-linux, build-windows]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release archive
        run: |
          mkdir -p release
          ls -R

          # Linux
          cp atomic-linux-x64/atomic-linux-x64-static release/
          cp atomic-linux-x64/atomic-linux-x64-dynamic release/
          tar czf release/atomic-linux-x64.tar.gz \
            -C atomic-linux-x64 atomic-linux-x64-static atomic-linux-x64-dynamic

          # Windows
          cp atomic-windows-x64/atomic-windows-x64-static.exe release/
          cp atomic-windows-x64/atomic-lsp-windows-x64.exe release/
          cp atomic-windows-x64/atomic-windows-x64.zip release/

          # LSP
          cp atomic-lsp-linux-x64/atomic-lsp release/atomic-lsp-linux-x64

          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
